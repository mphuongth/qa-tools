<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --surface: rgba(250,247,242,.78);
      --surface-strong: #f3ede2;
      --border: #d4c9b2;
      --text: #1a1815;
      --text2: #4a453e;
      --text3: #8a8278;
      --accent: #b8462f;
    }

    html, body {
      min-height: 100vh;
      font-family: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(ellipse at top left, rgba(184,70,47,.08), transparent 45%),
        radial-gradient(ellipse at bottom right, rgba(74,103,65,.06), transparent 48%),
        var(--bg);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.035'/></svg>");
      pointer-events: none;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 28px 48px;
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-mark {
      width: min(240px, 42vw);
      margin: 0 auto 18px;
      display: block;
      filter: drop-shadow(0 12px 22px rgba(28, 24, 18, 0.12));
    }

    .brand-mark img {
      width: 100%;
      height: auto;
      display: block;
    }

    .brand-fallback {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .hero h1 {
      font-family: Fraunces, Georgia, serif;
      font-size: clamp(42px, 6vw, 72px);
      line-height: 0.98;
      letter-spacing: -0.025em;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 16px;
      color: var(--text2);
      white-space: nowrap;
    }

    .repo-bar {
      margin: 0 auto 34px;
      max-width: 720px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      backdrop-filter: blur(6px);
    }

    .repo-bar label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
    }

    .repo-row {
      display: flex;
      gap: 8px;
    }

    .repo-row input {
      flex: 1 1 auto;
      min-width: 0;
      padding: 10px 12px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
    }

    .repo-row #track-base-input {
      flex: 0 0 150px;
    }

    .repo-row input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .repo-row button {
      flex: 0 0 auto;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: #faf7f2;
      background: var(--accent);
      border: none;
      border-radius: 9px;
      cursor: pointer;
    }

    .repo-row button:hover { filter: brightness(1.08); }

    .repo-status {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text3);
    }

    .repo-status.warn { color: var(--accent); }

    .tools {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 260px));
      gap: 28px;
      justify-content: center;
      align-items: stretch;
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      box-shadow: 0 1px 0 rgba(60,40,20,.08);
      padding: 20px 20px 16px;
      display: flex;
      flex-direction: column;
      min-height: 230px;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .tool-card:hover {
      transform: translateY(-2px);
      background: #fffdf9;
      border-color: #c7b8a0;
    }

    .tool-icon {
      width: 44px;
      height: 44px;
      border-radius: 2px;
      background: var(--accent);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .tool-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
    }

    .tool-card h2 {
      font-family: Fraunces, Georgia, serif;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .tool-card p {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      margin-top: auto;
      max-width: 26ch;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      margin-top: auto;
    }

    .explore {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .explore:hover { opacity: 0.8; }

    .empty {
      color: var(--text2);
      text-align: center;
      padding: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
    }

    @media (max-width: 720px) {
      .page { padding: 22px 16px 36px; }
      .hero { margin-bottom: 28px; }
      .hero p { white-space: normal; }
      .brand-mark { width: min(200px, 62vw); }
      .tools { gap: 18px; }
      .tool-card { min-height: 0; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>QA Tools</h1>
      <p>QA and delivery tools that run against any GitHub repo. Pick one below and the tools follow it.</p>
    </section>

    <section class="repo-bar">
      <label for="repo-input">GitHub repo</label>
      <div class="repo-row">
        <input
          id="repo-input"
          type="text"
          placeholder="owner/name or https://github.com/owner/name"
          autocomplete="off"
          spellcheck="false"
        />
        <input id="track-base-input" type="text" placeholder="base branch (dev)" autocomplete="off" spellcheck="false" />
        <button id="repo-save" type="button">Save</button>
      </div>
      <p class="repo-status" id="repo-status">Loading…</p>
    </section>

    <section class="tools" id="tools"></section>
  </main>

  <script>
    const repoInput = document.getElementById('repo-input');
    const trackBaseInput = document.getElementById('track-base-input');
    const repoStatus = document.getElementById('repo-status');

    async function loadSettings() {
      const response = await fetch('/api/settings');
      const settings = await response.json();
      applySettings(settings);
    }

    function applySettings(settings) {
      repoInput.value = settings.repo || '';
      trackBaseInput.value = settings.trackBase || '';
      repoStatus.textContent = settings.repo
        ? `Tools are running against ${settings.repo}.`
        : 'No repo selected yet. Enter one to enable the PR tracker and delivery summary.';
      repoStatus.classList.toggle('warn', !settings.repo);
    }

    async function saveSettings() {
      repoStatus.textContent = 'Saving…';
      repoStatus.classList.remove('warn');
      try {
        const response = await fetch('/api/settings', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ repo: repoInput.value, trackBase: trackBaseInput.value }),
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || 'Could not save the repo');
        applySettings(payload);
      } catch (error) {
        repoStatus.textContent = error.message;
        repoStatus.classList.add('warn');
      }
    }

    document.getElementById('repo-save').addEventListener('click', saveSettings);
    repoInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') saveSettings();
    });

    async function loadTools() {
      const response = await fetch('/api/tools');
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || 'Failed to load tools');
      renderTools(payload.tools || []);
    }

    function renderTools(tools) {
      const container = document.getElementById('tools');
      if (!tools.length) {
        container.innerHTML = '<div class="empty">No tools configured yet.</div>';
        return;
      }

      container.innerHTML = tools.map((tool) => `
        <article class="tool-card">
          <div class="tool-icon">${renderIcon(tool.icon || tool.id)}</div>
          <h2>${escapeHtml(tool.title)}</h2>
          <p>${escapeHtml(tool.description)}</p>
          <div class="actions">
            <a class="explore" href="${tool.href}">
              Explore
              <span aria-hidden="true">→</span>
            </a>
          </div>
        </article>
      `).join('');

      window.__toolsById = Object.fromEntries(tools.map((tool) => [tool.id, tool]));
    }

    function renderIcon(icon) {
      if (icon === 'pr-tracker') {
        return `
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 6h11"></path>
            <path d="M9 12h11"></path>
            <path d="M9 18h11"></path>
            <path d="M4 6h.01"></path>
            <path d="M4 12h.01"></path>
            <path d="M4 18h.01"></path>
          </svg>
        `;
      }

      if (icon === 'prod-delivery-summary') {
        return `
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 19h16"></path>
            <path d="M7 16V8"></path>
            <path d="M12 16V5"></path>
            <path d="M17 16v-4"></path>
          </svg>
        `;
      }

      if (icon === 'qa-pr-impact') {
        return `
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 18h6"></path>
            <path d="M10 14h4"></path>
            <path d="M12 3a7 7 0 0 0-4 12.75c.37.27.6.69.6 1.15V18a2 2 0 0 0 2 2h2.8a2 2 0 0 0 2-2v-1.1c0-.46.23-.88.6-1.15A7 7 0 0 0 12 3Z"></path>
          </svg>
        `;
      }

      if (icon === 'test-case-tracker') {
        return `
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 6h13"></path>
            <path d="M8 12h13"></path>
            <path d="M8 18h13"></path>
            <path d="M3 6l1.4 1.4L7 4.8"></path>
            <path d="M3 12l1.4 1.4L7 10.8"></path>
            <path d="M3 18l1.4 1.4L7 16.8"></path>
          </svg>
        `;
      }

      if (icon === 'file-compressor') {
        return `
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"></path>
            <path d="M14 2v6h6"></path>
            <path d="M10 12h4"></path>
            <path d="M9 16h6"></path>
            <path d="M12 10v8"></path>
          </svg>
        `;
      }

      return `
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="16" rx="2"></rect>
          <path d="M7 8h10"></path>
          <path d="M7 12h10"></path>
          <path d="M7 16h6"></path>
        </svg>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    loadSettings().catch((error) => {
      repoStatus.textContent = error.message;
      repoStatus.classList.add('warn');
    });

    loadTools().catch((error) => {
      document.getElementById('tools').innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>
