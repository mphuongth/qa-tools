<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA PR Impact</title>
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/console.css">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0c0f;--paper-warm:#1a1d23;--ink:#e9eaee;--muted:#a2a8b4;--faint:#6e7480;--rule:rgba(255,255,255,.08);--white:#14161b;--panel:#14161b;--accent:#5e6ad2;--accent2:#3fb950}
body{background:radial-gradient(60% 60% at 50% 0%, rgba(94,106,210,.13), transparent 70%) no-repeat, var(--bg);color:var(--ink);font-family:Inter,-apple-system,sans-serif;font-size:15px;line-height:1.7}
body::before{display:none}
.topnav{padding:18px 56px 0}
.home-link{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);text-decoration:none}
.home-link:hover{color:var(--ink)}
.hdr{border-bottom:1px solid var(--rule);padding:56px 56px 36px;background:rgba(11,12,15,.72);backdrop-filter:blur(10px)}
.lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6f7ae2;margin-bottom:12px}
.title{font-size:clamp(26px,3.2vw,34px);font-weight:600;line-height:1.15;letter-spacing:-.03em;margin-bottom:18px;max-width:760px}
.subtitle{color:var(--muted);max-width:700px}
.wrap{padding:28px 56px 90px}
.toolbar,.panel{background:var(--panel);border:1px solid var(--rule);border-radius:3px;box-shadow:0 1px 0 rgba(60,40,20,.08)}
.toolbar{padding:24px;margin-bottom:24px}
.form{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:end}
.field{display:flex;flex-direction:column;gap:8px}
.label{font-size:12px;font-weight:500;color:var(--muted)}
.input{width:100%;padding:14px 16px;border:1px solid var(--rule);border-radius:2px;background:var(--paper-warm);color:var(--ink);font:inherit;outline:none}
.input:focus{border-color:var(--accent);background:var(--white)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:0 14px;height:40px;font-size:13px;font-weight:500;border-radius:6px;border:1px solid transparent;background:var(--accent);color:#fff;cursor:pointer;transition:background 130ms cubic-bezier(.16,1,.3,1)}.btn:hover{background:#6f7ae2}
.btn:disabled{opacity:.45;cursor:not-allowed}
.status{margin-top:12px;font-size:12px;color:var(--faint);min-height:16px}
.panel{padding:28px}
.empty{font-size:13px;color:var(--faint)}
.meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.chip{display:inline-flex;align-items:center;gap:7px;height:26px;padding:0 11px;border-radius:999px;background:var(--paper-warm);border:1px solid var(--rule);font-size:12px;font-weight:500;color:var(--muted)}
.section{margin-top:26px}
.section:first-child{margin-top:0}
.section h2{font-size:19px;font-weight:600;letter-spacing:-.02em;line-height:1.25;margin-bottom:14px}
ul.list{list-style:none;display:flex;flex-direction:column;gap:12px}
ul.list li{display:grid;grid-template-columns:20px 1fr;gap:10px;font-size:17px;line-height:1.6;color:#2c2825}
ul.list li::before{content:"—";color:var(--faint);font-weight:300}
.muted{color:var(--muted)}
.split{display:grid;grid-template-columns:1fr;gap:24px;align-items:start}
.card{background:var(--panel);border:1px solid var(--rule);border-radius:3px;padding:20px}
.card h3{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:12px}
.hint{margin-top:10px;font-size:14px;color:var(--muted)}
@media(max-width:720px){
  .topnav{padding:18px 20px 0}
  .hdr,.wrap{padding-left:20px;padding-right:20px}
  .title{font-size:34px}
  .form{grid-template-columns:1fr}
  .btn{width:100%}
}
</style>
</head>
<body>
<div class="topnav">
  <a class="home-link" href="/">← Home</a>
</div>
<header class="hdr">
  <div class="lbl">QA Planning</div>
  <h1 class="title">QA PR Impact</h1>
  <p class="subtitle">Paste a GitHub pull request link and get a QA-focused verification plan: what to verify first, what nearby areas may regress, and which manual test cases are worth running.</p>
</header>

<main class="wrap">
  <section class="toolbar">
    <div class="form">
      <label class="field">
        <span class="label">GitHub PR URL</span>
        <input id="pr-url" class="input" type="url" placeholder="https://github.com/owner/name/pull/1234">
      </label>
      <button id="analyze-btn" class="btn" onclick="analyze()">Analyze PR</button>
    </div>
    <div class="status" id="status">Ready.</div>
  </section>

  <section class="panel" id="panel">
    <div class="empty">Paste a PR link above, then click “Analyze PR”.</div>
  </section>
</main>

<script>
let currentState = null;

async function analyze(){
  const prUrl = document.getElementById('pr-url').value.trim();
  if(!prUrl){
    setStatus('Enter a GitHub PR URL first.', true);
    return;
  }

  const button = document.getElementById('analyze-btn');
  button.disabled = true;
  setStatus('Analyzing PR...');

  try{
    const response = await fetch('/api/tools/qa-pr-impact/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ prUrl }),
    });
    const payload = await response.json();
    if(!response.ok) throw new Error(payload.error || 'Failed to analyze PR');
    currentState = payload;
    render(payload);
    setStatus('Analysis complete.');
  }catch(error){
    setStatus(error.message || 'Analysis failed.', true);
  }finally{
    button.disabled = false;
  }
}

function render(state){
  const panel = document.getElementById('panel');
  const primary = Array.isArray(state.primaryAreas) ? state.primaryAreas : [];
  const related = Array.isArray(state.relatedAreas) ? state.relatedAreas : [];
  const must = Array.isArray(state.testPlan?.must) ? state.testPlan.must : [];
  const nice = Array.isArray(state.testPlan?.nice) ? state.testPlan.nice : [];

  panel.innerHTML = `
    <div class="split">
      <div>
        <section class="section">
          <div class="meta">
            <span class="chip">PR #${escapeHtml(state.pull?.number || '')}</span>
            <span class="chip">Confidence ${escapeHtml(state.confidence || 'Unknown')}</span>
          </div>
          <h2>${escapeHtml(state.pull?.title || 'Untitled PR')}</h2>
          <div class="hint"><a href="${escapeHtml(state.pull?.url || '#')}" target="_blank" rel="noreferrer">Open PR</a></div>
        </section>

        <section class="section">
          <h2>Primary Areas To Verify</h2>
          ${renderList(primary, 'No strong feature match found from the current rules.')}
        </section>

        <section class="section">
          <h2>Related Areas Possibly Affected</h2>
          ${renderList(related, 'None surfaced from the current rule set.')}
        </section>

        <section class="section">
          <h2>Suggested Test Cases</h2>
          ${renderCaseBlock('Must Test', must, 'No mapped must-test cases yet.')}
          ${renderCaseBlock('Nice To Test', nice, 'No optional regression checks mapped yet.')}
        </section>
      </div>
    </div>
  `;
}

function renderList(items, emptyText){
  if(!items.length){
    return `<div class="empty">${escapeHtml(emptyText)}</div>`;
  }
  return `<ul class="list">${items.map(item=>`<li>${escapeHtml(formatArea(item))}</li>`).join('')}</ul>`;
}

function renderCaseBlock(title, items, emptyText){
  return `
    <div class="card" style="margin-top:14px">
      <h3>${escapeHtml(title)}</h3>
      ${items.length ? `<ul class="list">${items.map(item=>`<li>${escapeHtml(item)}</li>`).join('')}</ul>` : `<div class="empty">${escapeHtml(emptyText)}</div>`}
    </div>
  `;
}

function formatArea(item){
  const area = titleCase(item?.area || '');
  const confidence = titleCase(item?.confidence || 'medium');
  return `${area} (${confidence})`;
}

function titleCase(value){
  return String(value).split(' ').map(part=>part ? part[0].toUpperCase()+part.slice(1) : part).join(' ');
}

function setStatus(message, isError=false){
  const el = document.getElementById('status');
  el.textContent = message;
  el.style.color = isError ? '#b42318' : 'var(--faint)';
}

function escapeHtml(value){
  return String(value)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}
</script>
</body>
</html>
